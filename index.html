<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Page</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background: transparent;
        }

        /* Background Video */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Main title */
        h1 {
            margin-top: 20px;
            text-align: center;
            color: black;

            background: rgba(255,255,255,0.82);
            display: inline-block;

            padding: 15px 25px;
            border-radius: 12px;

            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Intro box */
        .content {
            margin-top: 30px;
            text-align: center;
            color: black;

            background: rgba(255,255,255,0.82);

            padding: 20px;
            border-radius: 12px;

            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;

            backdrop-filter: blur(6px);
        }

        /* Navigation buttons */
        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
            margin-top: 20px;
        }

        nav ul li {
            display: inline;
            margin: 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;

            background: rgba(0,0,0,0.55);
            padding: 10px 18px;
            border-radius: 8px;

            transition: 0.3s;
        }

        nav ul li a:hover {
            background: rgba(0,0,0,0.8);
            text-decoration: underline;
        }

        /* Centered image section */
        .image-section {
            text-align: center;
            margin-top: 40px;
        }

        .image-section img {
            width: 900px;
            max-width: 95%;
            height: auto;

            border-radius: 16px;

            background: rgba(255,255,255,0.82);
            padding: 10px;

            backdrop-filter: blur(6px);
        }

    </style>
</head>

<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="MDvid.mp4" type="video/mp4">
    </video>

    <!-- Main Title -->
    <h1>Welcome to my page (under construction).</h1>

    <!-- Intro -->
    <div class="content">

        <p>
            Hello and welcome! I am Arthur Pyuskulyan.
            This website contains information about me, my research, and a pathway to my GitHub with repositories.
        </p>

        <p>
            Explore the sections below:
        </p>

    </div>

    <!-- Navigation Buttons -->
    <nav>
        <ul>

            <li>
                <a href="about_me.html">
                    About Me
                </a>
            </li>
            <li>
                <a href="research.html">
                    Research
                </a>
            </li>            

            <li>
                <a href="CV52526_Pyuskulyan_Arthur.pdf" target="_blank">
                    CV
                </a>
            </li>

            <li>
                <a href="https://github.com/arthurpyuskulyan" target="_blank">
                    GitHub
                </a>
            </li>

        </ul>
    </nav>

    <!-- Centered Image -->
    <div class="image-section">
        <img src="posterpicture.jpg" alt="Poster Image">
    </div>

</body>
</html>
